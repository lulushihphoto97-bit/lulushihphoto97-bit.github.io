<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma page</title>
    <link rel="stylesheet" href="style/filter.css">
    <link rel="stylesheet" href="style/shared.css">
    <script src="scripts/filter.js"></script>
</head>
<body data-page="filter">
    <!-- 遮罩 + 彈窗 -->
    <div class="filter-overlay" id="filter-overlay" hidden></div>

    <section class="filter-dialog" id="filter-dialog" role="dialog" aria-modal="true" aria-labelledby="filter-title" hidden>
        <header class="filter-header">
            <button class="filter-close" aria-label="Fermer">×</button>
        </header>

        <div class="filter-body">
            <!-- Ingrédients -->
            <div class="filter-group">
            <h3 class="filter-subtitle ingredients">Ingrédients</h3>
            <div class="tag-list" aria-label="Filtre par ingrédients">
                <!-- data-state: neutral|include|exclude -->
                <button class="tag" data-state="neutral" data-key="rice">米飯</button>
                <button class="tag" data-state="neutral" data-key="noodles">麵食</button>
                <button class="tag" data-state="neutral" data-key="soup">湯</button>
                <button class="tag" data-state="neutral" data-key="soy">大豆</button>
                <button class="tag" data-state="neutral" data-key="tempeh">天貝</button>
                <button class="tag" data-state="neutral" data-key="natto">納豆</button>
            </div>
            </div>

            <!-- Allergènes -->
            <div class="filter-group">
            <h3 class="filter-subtitle allergies">Allergies</h3>
            <div class="tag-list" aria-label="Filtre par allergènes">
                <button class="tag" data-state="neutral" data-key="nuts">堅果</button>
                <button class="tag" data-state="neutral" data-key="gluten">麩質</button>
                <button class="tag" data-state="neutral" data-key="sesame">芝麻</button>
                <button class="tag" data-state="neutral" data-key="peanut">花生</button>
            </div>
            </div>
        </div>

        <footer class="filter-footer">
            <button class="btn reset">重置</button>
            <button class="btn apply">套用</button>
        </footer>
    </section>
</body>
</html>
<script type="module" src="/scripts/page/app.js"></script>
