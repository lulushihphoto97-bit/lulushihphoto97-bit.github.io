<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma page</title>
    <link rel="stylesheet" href="style/payment.css">
    <link rel="stylesheet" href="style/shared.css">
</head>
<body data-page="paiement">
    <!-- 頂部導覽列 -->
  <div class="top-container"> 
    <div class="topbar-container">
      <header class="topbar" role="banner">
          <!-- 左側：Go Back -->
          <div class="topbar-left">
            <a href="./panier.html" class="btn btn-ghost">← Go Back</a>
          </div>
          <!-- 右側：由右至左 Panier、Language、Filtre、Help -->
            <nav class="topbar-right" aria-label="Actions">
          <!-- Panier（購物車） -->
          <a href="./panier.html" class="btn">
            Panier <span class="badge" aria-label="articles dans le panier">0</span>
          </a>

          <!-- Language（下拉） -->
            <div class="dropdown">
              <button class="btn">Language ▾</button>
              <div class="dropdown-content" role="menu" aria-label="Choisir la langue">
                <a href="?lang=fr" role="menuitem">Français</a>
                <a href="?lang=en" role="menuitem">English</a>
                <a href="?lang=zh" role="menuitem">中文</a>
              </div>
            </div>

            <!-- Filtre（觸發彈窗） -->
              <button class="btn filter-trigger" aria-haspopup="dialog" aria-controls="filter-dialog">
                Filtre
              </button>

            <!-- Help -->
            <button class="btn">Help</button>
          </nav>
      </div>
    </header>
  </div> 
<div class="h2-container"></div>
  <main class="pay-page" aria-labelledby="pay-title">
    <!-- Mode de paiement -->
    <section class="pay-mode" aria-labelledby="mode-title">
      <h2 id="mode-title" class="section-title">Mode de paiement</h2>

      <fieldset class="mode-fieldset">
        <legend class="sr-only">Choisissez un mode de paiement</legend>

        <label class="mode-option">
          <input type="radio" name="mode" value="cash" checked>
          <span class="mode-label">Espèces</span>
        </label>

        <label class="mode-option">
          <input type="radio" name="mode" value="cb">
          <span class="mode-label">CB</span>
        </label>
      </fieldset>
    </section>

    <!-- Récapitulatif -->
    <section class="pay-recap" aria-labelledby="recap-title">
        <h2 id="recap-title" class="section-title">Récapitulatif</h2>
    <div class="recap-table" role="table" aria-label="Récapitulatif de votre commande">
      <div class="recap-row recap-head" role="row">
        <div class="recap-cell" role="columnheader">Article</div>
        <div class="recap-cell qty" role="columnheader">Qté</div>
        <div class="recap-cell price" role="columnheader">Montant</div>
      </div>

    <!-- Lignes d’articles (exemples) -->
      <div class="recap-row" role="row">
        <div class="recap-cell" role="cell">香煎豆腐定食</div>
        <div class="recap-cell qty" role="cell">2</div>
        <div class="recap-cell price" role="cell">€29,80</div>
      </div>
      <div class="recap-row" role="row">
        <div class="recap-cell" role="cell">納豆蔬菜丼</div>
        <div class="recap-cell qty" role="cell">1</div>
        <div class="recap-cell price" role="cell">€13,50</div>
      </div>

      <!-- Remise / Total -->
      <div class="recap-row recap-discount" role="row">
        <div class="recap-cell" role="cell">Remise</div>
        <div class="recap-cell qty" role="cell">—</div>
        <div class="recap-cell price" role="cell">– €3,00</div>
      </div>
      <div class="recap-row recap-total" role="row" aria-label="Total à payer">
        <div class="recap-cell" role="cell"><strong>Total</strong></div>
        <div class="recap-cell qty" role="cell">—</div>
        <div class="recap-cell price" role="cell"><strong>€40,30</strong></div>
      </div>
    </div>
    </section>

    <!-- Bouton Payer -->
        <div class="pay-footer" role="region" aria-label="Validation du paiement">
        <!-- 之後接第三方：把 href 換成第三方付款連結或在 button 上綁事件 -->
            <a class="btn-pay" href="#" role="button" aria-label="Procéder au paiement">Payer</a>
        </div>
    </main>
</body>
</html>
<script type="module" src="/scripts/page/app.js"></script>
